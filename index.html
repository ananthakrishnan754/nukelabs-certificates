<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuke Labs &mdash; Certificate Verification</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #f0ede8 0%, #e8e4de 100%);
}
.container {
  background: white;
  border-radius: 20px;
  padding: 48px 40px 36px;
  max-width: 460px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.06);
}
.logo { height: 44px; margin-bottom: 20px; }
h1 {
  font-size: 21px; color: #1a1a1a; margin-bottom: 4px;
  font-weight: 700; letter-spacing: -0.3px;
}
.accent {
  width: 32px; height: 3px; background: #f37501;
  margin: 12px auto 20px; border-radius: 2px;
}
.subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
.input-group {
  display: flex; gap: 8px; margin-bottom: 16px;
}
input {
  flex: 1; padding: 11px 14px;
  border: 1.5px solid #ddd8d0; border-radius: 10px;
  font-size: 12px; outline: none;
  font-family: 'Courier New', monospace;
  transition: border-color .2s;
}
input:focus { border-color: #f37501; }
button {
  padding: 11px 24px; background: #f37501; color: white;
  border: none; border-radius: 10px; font-size: 13px;
  cursor: pointer; font-weight: 600;
  transition: background .2s;
}
button:hover { background: #d66500; }
.result {
  margin-top: 12px; padding: 24px 20px;
  border-radius: 14px; display: none;
}
.result.valid {
  display: block; background: #f4faf4; border: 1px solid #c8e0c8;
}
.result.invalid {
  display: block; background: #fef4f4; border: 1px solid #e8c8c8;
}
.icon {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px; font-size: 22px; color: white;
}
.icon.green { background: #2e7d32; }
.icon.red { background: #c62828; }
.r-name { font-size: 19px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.r-course { font-size: 13px; color: #555; margin-bottom: 2px; }
.r-date { font-size: 12px; color: #888; }
.r-id { font-size: 10px; color: #bbb; margin-top: 10px; font-family: monospace; }
.footer { margin-top: 24px; font-size: 9px; color: #ccc; letter-spacing: 1px; }
</style>
</head>

  <h1>Certificate Verification</h1>
  <div class="accent"></div>
  <p class="subtitle">Enter the Certificate ID to verify authenticity</p>
  <div class="input-group">
    <input type="text" id="certInput" placeholder="NL-CERT-XXXX-XXXX-XXXX" onkeydown="if(event.key==='Enter') verify()">
    <button onclick="verify()">Verify</button>
  </div>
  <div class="result" id="result">
    <div class="icon green" id="checkmark">&#10003;</div>
    <div class="icon red" id="crossmark" style="display:none;">&#10007;</div>
    <div class="r-name" id="rName"></div>
    <div class="r-course" id="rCourse"></div>
    <div class="r-date" id="rDate"></div>
    <div class="r-id" id="rId"></div>
  </div>
  <div class="footer">Nuke Labs &mdash; Turning Ideas into Reality</div>
</div>
<script>
const records = {"NL-CERT-7B15-70C4-79A1": {"name": "Dhiya Binoy", "course": "5-Day Online Cybersecurity Course", "date": "July 2026"}, "NL-CERT-289B-1C73-143E": {"name": "ANN CELIN JOSE", "course": "5-Day Online Cybersecurity Course", "date": "July 2026"}, "NL-CERT-316F-B3CE-6ED0": {"name": "Dina K Shafar", "course": "5-Day Online Cybersecurity Course", "date": "July 2026"}, "NL-CERT-D414-B2A2-CAA0": {"name": "Joshua K Simon", "course": "5-Day Online Cybersecurity Course", "date": "July 2026"}, "NL-CERT-9F56-8BC3-EE4A": {"name": "Nimitha N K", "course": "5-Day Online Cybersecurity Course", "date": "July 2026"}, "NL-CERT-E259-60AA-4D1F": {"name": "Sachin Tony", "course": "5-Day Online Cybersecurity Course", "date": "July 2026"}, "NL-CERT-CB5D-E0FC-D8A7": {"name": "Ashly Thomas", "course": "5-Day Online Cybersecurity Course", "date": "July 2026"}};
function verify() {
  const input = document.getElementById('certInput').value.trim().toUpperCase();
  const result = document.getElementById('result');
  const checkmark = document.getElementById('checkmark');
  const crossmark = document.getElementById('crossmark');
  if (records[input]) {
    const r = records[input];
    document.getElementById('rName').textContent = r.name;
    document.getElementById('rCourse').textContent = r.course;
    document.getElementById('rDate').textContent = r.date;
    document.getElementById('rId').textContent = 'ID: ' + input;
    result.className = 'result valid';
    checkmark.style.display = 'flex';
    crossmark.style.display = 'none';
  } else {
    document.getElementById('rName').textContent = 'Invalid Certificate';
    document.getElementById('rCourse').textContent = 'No record found for this Certificate ID';
    document.getElementById('rDate').textContent = '';
    document.getElementById('rId').textContent = '';
    result.className = 'result invalid';
    checkmark.style.display = 'none';
    crossmark.style.display = 'flex';
  }
}
</script>
